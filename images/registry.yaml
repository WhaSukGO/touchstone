# CUDA image matrix (design §4.3). Pre-built images only; runtime builds are disabled.
# Add a row here (a deliberate human step) to support a new framework/CUDA combo.
# `image` should be a pinned, pre-built tag (ideally by digest) that already contains a
# CUDA-compiled framework — never built on the fly during an experiment.
images:
  - key: torch-2.4-cu121
    image: "pytorch/pytorch:2.4.0-cuda12.1-cudnn9-runtime"
    cuda: "12.1"
    healthcheck: "python -c 'import torch; assert torch.cuda.is_available()'"

  - key: torch-2.2-cu118
    image: "pytorch/pytorch:2.2.0-cuda11.8-cudnn8-runtime"
    cuda: "11.8"
    healthcheck: "python -c 'import torch; assert torch.cuda.is_available()'"

  # 'dummy' framework resolves to nothing on purpose: the self-test runs in local mode,
  # where no container image is required.
